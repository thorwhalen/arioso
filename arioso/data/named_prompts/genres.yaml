# Sub-genre/micro-genre -> sonic description prompt
# Sources: Every Noise at Once taxonomy, FMA, MTG-Jamendo, ConceptCaps

# Electronic sub-genres
vaporwave: "slowed-down samples, heavy reverb, lo-fi aesthetic, detuned synths, 80s commercial music texture, chopped and screwed"
synthwave: "analog synth pads, retro 80s arpeggios, driving drum machine, neon-lit atmosphere, gated reverb, pulsing bass"
darkwave: "brooding synths, cold reverb, minor key, post-punk guitar, melancholic vocals, gothic atmosphere"
witch_house: "heavily pitched-down vocals, chopped and screwed beats, occult atmosphere, dark ambient pads, distorted bass"
future_funk: "disco sample chops, side-chained compression, bright filtered synths, funky bass, upbeat tempo, city-pop influence"
lo_fi_hip_hop: "vinyl crackle, muted piano chords, soft boom-bap drums, warm tape saturation, jazzy samples, relaxed tempo"
chillwave: "washed-out reverb, hazy synths, dreamy vocals, soft beats, nostalgic warmth, summer haze atmosphere"
hyperpop: "pitch-shifted vocals, maximalist production, distorted bass, glitchy effects, sugary synths, chaotic energy"
drum_and_bass: "fast breakbeats at 170+ BPM, rolling sub-bass, chopped Amen break, atmospheric pads, dark energy"
dubstep: "half-time rhythm, heavy wobble bass, aggressive drops, sub-bass emphasis, dark atmosphere, 140 BPM"
house: "four-on-the-floor kick, off-beat hi-hats, warm bass, vocal chops, 120-130 BPM, Chicago groove"
techno: "repetitive 4/4 kick, minimal arrangement, industrial textures, hypnotic loops, Berlin warehouse sound, dark mechanical"
ambient: "slow evolution, atmospheric pads, no beat, spacious reverb, drone textures, environmental sounds"
trance: "euphoric arpeggios, building breakdowns, 138-145 BPM, supersaw leads, rolling bassline, epic drops"
downtempo: "relaxed beats, organic textures, warm bass, atmospheric pads, chill groove, trip hop influence"
garage: "skippy 2-step rhythm, pitched vocal chops, sub-bass, UK club energy, 130 BPM, shuffled hi-hats"
hardstyle: "distorted kick, 150+ BPM, euphoric melody, reverse bass, hard-hitting drums, rave energy"
psytrance: "rolling 16th-note bassline, 145+ BPM, psychedelic sound effects, acid squelch, hypnotic patterns"
breakbeat: "syncopated drum breaks, funky rhythm, sampled beats, energetic groove, hip hop influence"
idm: "complex rhythms, glitchy textures, abstract melody, experimental sound design, unpredictable structure"

# Rock sub-genres
shoegaze: "wall of distorted guitar, heavy reverb and delay, buried vocals, dreamy swirl, ethereal noise"
post_rock: "slow build dynamics, tremolo-picked guitars, cinematic crescendos, minimal vocals, expansive atmosphere"
post_punk: "angular guitar, driving bass, cold atmosphere, minimal production, motorik rhythm, dark mood"
math_rock: "complex time signatures, tapping guitars, intricate rhythms, clean tone, angular melodies, technical precision"
stoner_rock: "fuzzy down-tuned guitar, heavy bass, slow groove, psychedelic effects, desert atmosphere, thick distortion"
doom_metal: "extremely slow tempo, down-tuned heavy guitars, crushing bass, funeral atmosphere, massive distortion"
black_metal: "tremolo-picked guitars, blast beat drums, shrieked vocals, lo-fi production, cold atmosphere, wall of sound"
thrash_metal: "fast palm-muted riffs, double-bass drums, aggressive rhythm, tight precision, heavy distortion"
prog_metal: "complex time signatures, heavy distortion, technical guitar, odd meters, orchestral elements, dynamic shifts"
emo: "confessional vocals, jangly to heavy guitar dynamics, emotional intensity, melodic hooks, raw vulnerability"
midwest_emo: "twinkly clean guitar, complex fingerpicking, soft-loud dynamics, math rock influence, intimate vocals"
dream_pop: "shimmering guitars, soft vocals, reverb-drenched, ethereal atmosphere, gentle beats, hazy textures"
noise_rock: "abrasive guitar feedback, unconventional song structure, dissonant harmony, chaotic energy, angular riffs"
surf_rock: "spring reverb guitar, twangy Fender tone, driving rhythm, California beach vibe, tremolo effect"

# Hip hop sub-genres
boom_bap: "chopped soul samples, hard-hitting drums, scratched hooks, head-nodding groove, classic hip hop feel"
trap: "rapid hi-hats, 808 bass, dark atmospheric pads, ad-lib vocals, half-time feel, southern influence"
drill: "sliding 808 bass, dark minor key, aggressive flow, hi-hat rolls, menacing atmosphere, UK or Chicago style"
cloud_rap: "dreamy reverb-heavy beats, ethereal synths, lo-fi texture, laid-back flow, atmospheric haze"
phonk: "Memphis rap samples, cowbell percussion, dark chopped vocals, distorted 808s, lo-fi horror aesthetic"
jazz_rap: "jazz sample loops, upright bass, brushed drums, conscious lyrics, sophisticated musicality"

# World and fusion
afrobeats: "syncopated percussion, call-response vocal pattern, log drum texture, mid-tempo groove, bright horn stabs"
afro_house: "tribal percussion, deep house bass, African vocal chants, organic drums, 120-125 BPM, warm pads"
reggaeton: "dembow rhythm, 808 bass, Latin percussion, dancehall influence, perreo beat, urban production"
bossa_nova: "nylon guitar syncopation, gentle jazz harmony, soft brushed drums, warm bass, intimate vocals"
k_pop: "polished production, genre-blending arrangement, synchronized choreography feel, catchy hooks, maximalist mix"
city_pop: "jazzy chords, funky bass, 80s Japanese production, warm analog synths, sophisticated arrangement, groovy"
cumbia: "accordion melody, guiro percussion, off-beat bass, cumbia rhythm, tropical feel, Latin dance groove"
dancehall: "digital riddim, offbeat rhythm, heavy bass, Caribbean percussion, party energy, patois-style vocals"
flamenco: "nylon guitar rasgueado, palmas hand claps, cajón percussion, Phrygian harmony, passionate dynamics"
celtic: "fiddle melody, tin whistle, bodhran drum, jig and reel rhythms, bagpipe drone, modal harmony"
bollywood: "string section, tabla percussion, sitar accents, melodic hooks, dramatic dynamics, Indian classical scales"

