# Production technique/aesthetic name -> sonic description
# Sources: iZotope glossary, EDMProd glossary, Silverplatter Audio

tape_saturation: "warm harmonic distortion, gentle high-frequency rolloff, subtle compression, analog character, soft clipping"
vinyl_crackle: "surface noise pops and clicks, warm frequency response, lo-fi degradation, nostalgic texture"
tube_warmth: "even harmonic distortion, soft compression, warm low-mids, smooth transients, vintage amplifier character"
lo_fi: "reduced fidelity, filtered highs, bitcrushed texture, tape wobble, nostalgic imperfection, cozy warmth"
hi_fi: "full frequency range, pristine clarity, wide stereo image, detailed transients, transparent production"
sidechain_pumping: "rhythmic volume ducking, breathing effect, bass-kick interaction, EDM groove technique"
gated_reverb: "explosive initial reverb abruptly cut, 80s drum sound, Phil Collins snare, dramatic tail"
plate_reverb: "dense smooth metallic reverb, warm vintage character, vocal sweetening, classic studio sound"
spring_reverb: "twangy metallic reverb, surf guitar character, boing-like resonance, vintage amp effect"
room_reverb: "natural acoustic space, small to medium ambience, realistic depth, live-room feel"
cathedral_reverb: "massive long decay, sacred space feel, swelling echoes, ethereal wash, choral ambience"
tape_delay: "warm analog echo, slightly degraded repeats, rhythmic feedback, vintage character, dub influence"
ping_pong_delay: "stereo-bouncing echoes, left-right alternation, spatial movement, rhythmic width"
chorus_effect: "detuned doubled signal, lush thickening, shimmering modulation, 80s guitar and synth character"
phaser_effect: "sweeping comb filter, jet-like whoosh, psychedelic movement, rotating speaker simulation"
flanger_effect: "metallic sweeping comb filter, jet-plane whoosh, sci-fi texture, chorus-like but more extreme"
bitcrushing: "reduced bit depth, crunchy digital distortion, retro game sound, pixelated texture"
granular: "time-stretched particles, fragmented audio grains, textural clouds, ambient decomposition"
vocoder_effect: "robot voice synthesis, synth-shaped speech, electronic choir, Kraftwerk aesthetic"
pitch_shifting: "altered pitch without tempo change, chipmunk or slowed effect, formant shifting"
time_stretching: "altered tempo without pitch change, grainy artifacts at extremes, ambient stretching"
brick_wall_limiting: "loudness maximized, transients squashed, modern master loudness, dense compressed wall"
parallel_compression: "punchy dynamics, blended clean and crushed signals, New York compression, thick energy"
multiband_compression: "frequency-specific dynamics control, polished modern master, balanced spectrum, radio-ready"
stereo_widening: "expanded stereo image, spatial enhancement, immersive width, side-channel emphasis"
mono_mix: "single-channel centered mix, vintage radio feel, focused narrow image, retro production"
dry_mix: "minimal reverb and effects, close-mic presence, intimate direct sound, acoustic clarity"
wet_mix: "heavy reverb and effects, spacious wash, dreamy distance, atmospheric processing"
