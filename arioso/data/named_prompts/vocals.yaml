# Vocal style/technique name -> sonic description
# Sources: Pitchfork vocal descriptors, Suno voice tags, ElevenLabs guide

belting: "loud sustained chest resonance, high intensity, bright formant emphasis, powerful projection"
falsetto: "light head voice, airy upper register, delicate quality, reduced chest resonance"
whisper: "breathy intimate delivery, low volume, close-mic ASMR quality, soft sibilance"
growl: "gritty low vocal fry, distorted resonance, aggressive rasp, metallic edge"
scream: "high intensity distorted vocal, extreme projection, harsh overtones, metal or punk style"
vibrato: "oscillating pitch modulation, operatic or soulful, warm sustained notes, expressive tremor"
melismatic: "rapid note runs on single syllable, gospel or R&B influence, ornamental agility"
breathy: "airy vocal quality, audible breath, intimate delivery, soft edges, bedroom pop feel"
nasal: "resonance focused in nasal cavity, bright twangy quality, punk or country character"
raspy: "rough textured voice, slight distortion, lived-in quality, blues or rock character"
operatic: "classical trained projection, wide vibrato, full dynamic range, dramatic intensity, bel canto"
scat: "improvised nonsense syllables, jazz vocal technique, rhythmic and melodic improvisation"
spoken_word: "rhythmic speech, no pitched melody, poetry delivery, hip hop or slam style"
rap: "rhythmic vocal delivery, rapid syllables, percussive consonants, hip hop flow patterns"
auto_tuned: "pitch-corrected vocals, robotic smooth glides, T-Pain style, modern pop and trap character"
vocoder: "synthesized vocal, robotic harmonic texture, Daft Punk style, electronic voice processing"
choir: "multiple voices in harmony, full choral blend, cathedral reverb, sacred or epic feel"
call_and_response: "leader phrase followed by group echo, gospel or African tradition, communal energy"
yodel: "rapid alternation between chest and head voice, Alpine or country style, dramatic register breaks"
throat_singing: "harmonic overtone technique, drone fundamental, Tuvan or Mongolian style, multiple pitches simultaneously"
soprano: "high female voice, clear upper register, classical training, bright resonance, soaring melody"
alto: "low female voice, warm dark tone, rich lower register, contralto depth"
tenor: "high male voice, bright powerful tone, operatic or pop, ringing upper register"
baritone: "mid-range male voice, warm rich tone, authoritative delivery, comfortable mid register"
bass_voice: "deep low male voice, rumbling lower register, powerful foundation, resonant depth"
